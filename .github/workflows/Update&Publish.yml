name: Update WhatsApp Web Version

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write 

jobs:
  update-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          
      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Update WhatsApp Web Version
        run: node script/Update-version.js

      - name: Sync and Commit Versions
        id: sync_step
        run: |
          git config --global user.name "Lunarianbyte[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add lib/Defaults/baileys-version.json lib/Defaults/index.js

          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          git add package.json
          git commit -m "chore: update WhatsApp Web version"

          # Ambil update terbaru dari remote dulu
          git pull --rebase origin master

          git push origin master
          echo "changed=true" >> $GITHUB_OUTPUT
